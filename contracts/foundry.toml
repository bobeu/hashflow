[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]

[rpc_endpoints]
hashkey_testnet = "https://hashkeychain-testnet.alt.technology"

# Blockscout-based explorer for HashKey Chain Testnet (Chain ID: 133).
# Usage: forge verify-contract <address> <contract> \
#          --chain 133 --verifier blockscout \
#          --verifier-url $HASHKEY_BLOCKSCOUT_URL
[etherscan]
hashkey_testnet = { key = "dummy", url = "https://hashkeychain-testnet-explorer.alt.technology/api" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
